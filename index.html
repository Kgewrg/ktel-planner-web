<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTEL Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }
        .header p {
            margin-top: 8px;
            opacity: 0.9;
        }
        .form-container {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }
        #searchBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        #searchBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        #searchBtn:active {
            transform: translateY(0);
        }
        #output {
            padding: 0 30px 30px;
        }
        .results {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .route-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .route-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .route-card .trip {
            font-weight: 600;
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .route-card .wait {
            color: #666;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .route-card .wait-time {
            color: #667eea;
            font-weight: 700;
            font-size: 16px;
        }
        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>KTEL Planner</h1>
        </div>
        
        <div class="form-container">
            <div class="form-group">
                <label for="departure">📍 Πόλη Αναχώρησης</label>
                <input type="text" id="departure" list="cities" placeholder="Επιλέξτε πόλη...">
                <datalist id="cities">
                    <option value="Άμφισσα">
                    <option value="Άργος">
                    <option value="Άρτα ">
                    <option value="Αγρίνιο">
                    <option value="Αδάμ">
                    <option value="Αθήνα (Κηφισός)">
                    <option value="Αθήνα (Π.Άρεως)">
                    <option value="Αθήνα (Πειραιάς)">
                    <option value="Αιγίνιο">
                    <option value="Αιδηψός">
                    <option value="Αλεξανδρούπολη">
                    <option value="Αλιβέρι">
                    <option value="Αμαλιάδα">
                    <option value="Αμύνταιο">
                    <option value="Ανδραβίδα">
                    <option value="Αξιούπολη">
                    <option value="Αριδαία">
                    <option value="Ασπροβάλτα">
                    <option value="Βάρδα">
                    <option value="Βέροια">
                    <option value="Βρασνά">
                    <option value="Βόλος">
                    <option value="Γαλαξίδι">
                    <option value="Γαστούνη">
                    <option value="Γιαννιτσά">
                    <option value="Γουμένισσα">
                    <option value="Γρεβενά">
                    <option value="Δελφοί">
                    <option value="Διδυμότειχο">
                    <option value="Δράμα">
                    <option value="Έδεσσα">
                    <option value="Ελασσόνα">
                    <option value="Εύρωπος ">
                    <option value="Ζάκυνθος">
                    <option value="Ζαγκλιβέρι">
                    <option value="Ηγουμενίτσα">
                    <option value="Ηράκλεια">
                    <option value="Ηράκλειο">
                    <option value="Θήβα">
                    <option value="Ισθμός">
                    <option value="Ιτέα">
                    <option value="Ιωάννινα">
                    <option value="Κέρκυρα">
                    <option value="Καβάλα">
                    <option value="Καλαμάτα">
                    <option value="Καλαμπάκα">
                    <option value="Καλαμωτό">
                    <option value="Καρδίτσα">
                    <option value="Καστοριά">
                    <option value="Κατερίνη">
                    <option value="Κιάτο">
                    <option value="Κιλκίς">
                    <option value="Κοζάνη">
                    <option value="Κολινδρός">
                    <option value="Κομοτηνή">
                    <option value="Κορμίστα, Παγγαίο">
                    <option value="Κρύα Βρύση">
                    <option value="Κόρινθος">
                    <option value="Λάρισα">
                    <option value="Λήμνος">
                    <option value="Λαμία">
                    <option value="Λεπτοκαρυά">
                    <option value="Λευκάδα">
                    <option value="Λεχαινά">
                    <option value="Λιτόχωρο">
                    <option value="Μακρύγιαλος">
                    <option value="Μαυροθάλασσα">
                    <option value="Μεθώνη">
                    <option value="Μεσολόγγι">
                    <option value="Μυτιλήνη">
                    <option value="Ν.Πόρροι">
                    <option value="Νάουσα">
                    <option value="Νέα Απολλωνία">
                    <option value="Νέα Μανωλάδα">
                    <option value="Ναύπλιο">
                    <option value="Νιγρίτα">
                    <option value="Ξάνθη">
                    <option value="Ολυμπιάδα">
                    <option value="Ορεστιάδα">
                    <option value="Πάργα">
                    <option value="Πάτρα">
                    <option value="Παλιά Πέλλα">
                    <option value="Πετροκέρασα">
                    <option value="Πλαταμώνας">
                    <option value="Πολύκαστρο">
                    <option value="Πρέβεζα">
                    <option value="Προβατώνας">
                    <option value="Πτολεμαΐδα">
                    <option value="Πύργος">
                    <option value="Ρεντίνα">
                    <option value="Ροδολίβος">
                    <option value="Σέρρες">
                    <option value="Σαββάλια">
                    <option value="Σιδηρόκαστρο">
                    <option value="Σκύδρα">
                    <option value="Σουφλί">
                    <option value="Σπάρτη">
                    <option value="Σταυρός">
                    <option value="Τούμπα">
                    <option value="Τρίκαλα">
                    <option value="Τρίπολη">
                    <option value="Φέρες">
                    <option value="Φιλιππιάδα">
                    <option value="Φλώρινα">
                    <option value="Χαλκίδα">
                    <option value="Χανι">
                </datalist>
            </div>

            <div class="form-group">
                <label for="destination">📍 Πόλη Προορισμού</label>
                <input type="text" id="destination" list="cities" placeholder="Επιλέξτε πόλη...">
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="dayOfTravel">📅 Ημέρα</label>
                    <select id="dayOfTravel">
                        <option value="1">Δευτέρα</option>
                        <option value="2">Τρίτη</option>
                        <option value="3">Τετάρτη</option>
                        <option value="4">Πέμπτη</option>
                        <option value="5">Παρασκευή</option>
                        <option value="6">Σάββατο</option>
                        <option value="7">Κυριακή</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="minWaitTime">Ελάχιστη αναμονή (λεπτά)</label>
                    <input type="number" id="minWaitTime" value="10">
                </div>

                <div class="form-group">
                    <label for="maxWaitTime">Μέγιστη αναμονή (λεπτά)</label>
                    <input type="number" id="maxWaitTime" value="60">
                </div>
            </div>

            <button id="searchBtn">🔍 Αναζήτηση Διαδρομών</button>
        </div>
        
        <div id="output"></div>
    </div>

    <script>
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const departureCity = document.getElementById('departure').value;
            const destinationCity = document.getElementById('destination').value;
            const dayOfTravel = document.getElementById('dayOfTravel').value;
            const minWaitTime = document.getElementById('minWaitTime').value;
            const maxWaitTime = document.getElementById('maxWaitTime').value;

            const output = document.getElementById('output');
            output.innerHTML = '<div class="no-results">⏳ Φόρτωση...</div>';

            try {
                const response = await fetch('/api/route', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ departureCity, destinationCity, dayOfTravel, minWaitTime, maxWaitTime })
                });
                const result = await response.json();

                if (result.error) {
                    output.innerHTML = `<div class="no-results">⚠️ ${result.error}</div>`;
                } else if (result.length === 0) {
                    output.innerHTML = '<div class="no-results">😕 Δεν βρέθηκαν διαδρομές</div>';
                } else {
                    let html = '<div class="results">';
                    for (const route of result) {
                        html += `
                            <div class="route-card">
                                <div class="trip">🚌 Αναχώριση ${route[0]} ➝ Άφιξη: ${route[3]} </div>
                                <div class="wait">⏳ Χρόνος αναμονής: <span class="wait-time"> ${route[4]} λεπτά</span></div> 
                                <div class="wait"> Περίοδος αναμονής: απο ${route[1]} εως ${route[2]}</div>
                            </div>
                        `;
                    }
                    html += '</div>';
                    output.innerHTML = html;
                }
            } catch (e) {
                output.innerHTML = `<div class="no-results">❌ Σφάλμα: ${e.message}</div>`;
            }
        });
    </script>
</body>
</html>
