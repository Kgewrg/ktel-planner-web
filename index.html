<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTEL Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #281E18 0%, #572D0C 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff5f0;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #f9b49e 0%, #b45d41 100%);
            color: #221c15;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #221c15;
        }
        .header p {
            margin-top: 8px;
            opacity: 0.8;
            color: #221c15;
        }
        .form-container {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #221c15;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0d4cf;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #b45d41;
            box-shadow: 0 0 0 4px rgba(180,93,65,0.2);
        }
        .searchable-select {
            position: relative;
        }
        .searchable-select input {
            cursor: pointer;
        }
        .searchable-select .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #b45d41;
            border-top: none;
            border-radius: 0 0 10px 10px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .searchable-select .dropdown.show {
            display: block;
        }
        .searchable-select .dropdown div {
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            color: #221c15;
        }
        .searchable-select .dropdown div:hover {
            background: #f9e0db;
        }
        .searchable-select .dropdown div.highlighted {
            background: #f9d0c7;
        }
        .searchable-select .dropdown div.no-match {
            color: #999;
            cursor: default;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-title {
            text-align: center;
            flex: 1;
        }
        .row .form-group {
            flex: 1;
        }
        #searchBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f9b49e 0%, #b45d41 100%);
            color: #221c15;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        #searchBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(180,93,65,0.4);
        }
        #searchBtn:active {
            transform: scale(0.98);
        }
        #output {
            padding: 0 30px 30px;
        }
        .results {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .route-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid #e0d4cf;
            transition: all 0.2s ease;
        }
        .route-card:hover {
            transform: translateX(5px);
            border-color: #b45d41;
            box-shadow: 0 5px 20px rgba(180,93,65,0.2);
        }
        .route-card .trip {
            font-weight: 600;
            font-size: 16px;
            color: #221c15;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .route-card .wait {
            color: #221c15;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .route-card .wait-time {
            color: #b45d41;
            font-weight: 800;
            font-size: 16px;
        }
        .no-results {
            text-align: center;
            padding: 40px;
            color: #221c15;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>KTEL Planner</h1>
            <p><b>Μια εφαρμογή που βρίσκει τα δρομολόγια με τον λιγότερο χρόνο αναμονής που έχουν ενδιάμεση στάση τον σταθμό ΚΤΕΛ Μακεδόνιας.</b></p>
        </div>
        
        <div class="form-container">
            <div class="form-group">
                <label for="departure">Πόλη Αναχώρησης</label>
                <div class="searchable-select" id="departureSelect">
                    <input type="text" id="departure" placeholder="Επιλέξτε πόλη...">
                    <div class="dropdown"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="destination">Πόλη Προορισμού</label>
                <div class="searchable-select" id="destinationSelect">
                    <input type="text" id="destination" placeholder="Επιλέξτε πόλη...">
                    <div class="dropdown"></div>
                </div>
            </div>

            <div class="row">
                <div class="form-title"> <label for="dayOfTravel">Ημέρα Ταξιδιού</label> </div>
                <div class="form-title"> <label for="minWaitTime">Ελάχιστη αναμονή (λεπτά)</label> </div>
                <div class="form-title"> <label for="maxWaitTime">Μέγιστη αναμονή (λεπτά)</label> </div>
            </div>


            <div class="row">
                <div class="form-group">
                    <select id="dayOfTravel">
                        <option value="1">Δευτέρα</option>
                        <option value="2">Τρίτη</option>
                        <option value="3">Τετάρτη</option>
                        <option value="4">Πέμπτη</option>
                        <option value="5">Παρασκευή</option>
                        <option value="6">Σάββατο</option>
                        <option value="7">Κυριακή</option>
                    </select>
                </div>

                <div class="form-group">
                    
                    <input type="number" id="minWaitTime" value="10">
                </div>

                <div class="form-group">
                    
                    <input type="number" id="maxWaitTime" value="60">
                </div>
            </div>

            <button id="searchBtn">Αναζήτηση</button>
        </div>
        
        <div id="output"></div>
    </div>

    <script>
        const cities = [
            "Άμφισσα", "Άργος", "Άρτα", "Αγρίνιο", "Αδάμ", "Αθήνα (Κηφισός)", "Αθήνα (Π.Άρεως)", "Αθήνα (Πειραιάς)",
            "Αιγίνιο", "Αιδηψός", "Αλεξανδρούπολη", "Αλιβέρι", "Αμαλιάδα", "Αμύνταιο", "Ανδραβίδα", "Αξιούπολη",
            "Αριδαία", "Ασπροβάλτα", "Βάρδα", "Βέροια", "Βρασνά", "Βόλος", "Γαλαξίδι", "Γαστούνη", "Γιαννιτσά",
            "Γουμένισσα", "Γρεβενά", "Δελφοί", "Διδυμότειχο", "Δράμα", "Έδεσσα", "Ελασσόνα", "Εύρωπος", "Ζάκυνθος",
            "Ζαγκλιβέρι", "Ηγουμενίτσα", "Ηράκλεια", "Ηράκλειο", "Θήβα", "Ισθμός", "Ιτέα", "Ιωάννινα", "Κέρκυρα",
            "Καβάλα", "Καλαμάτα", "Καλαμπάκα", "Καλαμωτό", "Καρδίτσα", "Καστοριά", "Κατερίνη", "Κιάτο", "Κιλκίς",
            "Κοζάνη", "Κολινδρός", "Κομοτηνή", "Κορμίστα, Παγγαίο", "Κρύα Βρύση", "Κόρινθος", "Λάρισα", "Λήμνος",
            "Λαμία", "Λεπτοκαρυά", "Λευκάδα", "Λεχαινά", "Λιτόχωρο", "Μακρύγιαλος", "Μαυροθάλασσα", "Μεθώνη",
            "Μεσολόγγι", "Μυτιλήνη", "Ν.Πόρροι", "Νάουσα", "Νέα Απολλωνία", "Νέα Μανωλάδα", "Ναύπλιο", "Νιγρίτα",
            "Ξάνθη", "Ολυμπιάδα", "Ορεστιάδα", "Πάργα", "Πάτρα", "Παλιά Πέλλα", "Πετροκέρασα", "Πλαταμώνας",
            "Πολύκαστρο", "Πρέβεζα", "Προβατώνας", "Πτολεμαΐδα", "Πύργος", "Ρεντίνα", "Ροδολίβος", "Σέρρες",
            "Σαββάλια", "Σιδηρόκαστρο", "Σκύδρα", "Σουφλί", "Σπάρτη", "Σταυρός", "Τούμπα", "Τρίκαλα", "Τρίπολη",
            "Φέρες", "Φιλιππιάδα", "Φλώρινα", "Χαλκίδα", "Χανιά"
        ];

        function initSearchableSelect(containerId, inputId) {
            const container = document.getElementById(containerId);
            const input = document.getElementById(inputId);
            const dropdown = container.querySelector('.dropdown');

            function renderDropdown(filter = '') {
                dropdown.innerHTML = '';
                const filtered = cities.filter(c => c.toLowerCase().includes(filter.toLowerCase()));
                
                if (filtered.length === 0) {
                    dropdown.innerHTML = '<div class="no-match">Δεν βρέθηκαν αποτελέσματα</div>';
                } else {
                    filtered.forEach(city => {
                        const div = document.createElement('div');
                        div.textContent = city;
                        div.addEventListener('click', () => {
                            input.value = city;
                            dropdown.classList.remove('show');
                        });
                        dropdown.appendChild(div);
                    });
                }
            }

            input.addEventListener('click', () => {
                renderDropdown();
                dropdown.classList.add('show');
            });

            input.addEventListener('input', () => {
                renderDropdown(input.value);
                dropdown.classList.add('show');
            });

            document.addEventListener('click', (e) => {
                if (!container.contains(e.target)) {
                    dropdown.classList.remove('show');
                }
            });
        }

        initSearchableSelect('departureSelect', 'departure');
        initSearchableSelect('destinationSelect', 'destination');

        document.getElementById('searchBtn').addEventListener('click', async () => {
            const departureCity = document.getElementById('departure').value;
            const destinationCity = document.getElementById('destination').value;
            const dayOfTravel = document.getElementById('dayOfTravel').value;
            const minWaitTime = parseInt(document.getElementById('minWaitTime').value);
            const maxWaitTime = parseInt(document.getElementById('maxWaitTime').value);

            if (departureCity==""){
                const output = document.getElementById('output');
                output.innerHTML = '<div class="no-results">Το πεδίο "πόλη αναχώρισης" είναι κενό</div>';
                return;
            }

            if (destinationCity==""){
                const output = document.getElementById('output');
                output.innerHTML = '<div class="no-results">Το πεδίο "πόλη προορισμού" είναι κενό</div>';
                return;
            }

            if (maxWaitTime <= minWaitTime) {
                const output = document.getElementById('output');
                output.innerHTML = '<div class="no-results">Ο μέγιστος χρόνος αναμονής πρέπει να είναι μεγαλύτερος από τον ελάχιστο</div>';
                return;
            }

            if (departureCity == destinationCity){
                const output = document.getElementById('output');
                output.innerHTML = '<div class="no-results">Η πόλη αναχώρισης δεν μπορεί να είναι η ίδια με την πόλη προορισμού</div>';
                return;
            }

            const output = document.getElementById('output');
            output.innerHTML = '<div class="no-results">⏳ Φόρτωση...</div>';

            try {
                const response = await fetch('/api/route', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ departureCity, destinationCity, dayOfTravel, minWaitTime, maxWaitTime })
                });
                const result = await response.json();

                if (result.error) {
                    output.innerHTML = `<div class="no-results">${result.error}</div>`;
                } else if (result.length === 0) {
                    output.innerHTML = '<div class="no-results">Δεν βρέθηκαν διαδρομές</div>';
                } else {
                    let html = '<div class="results">';
                    html += '<div class="no-results">Τα δρομολόγια πρέπει να επιβεβαιώνονται απο το ΚΤΕΛ ΜΑΚΕΔΟΝΙΑ ή/και τα τοπικά πρακτορία.</div>';
                    for (const route of result) {
                        html += `
                            <div class="route-card">
                                <div class="trip">Αναχώριση: ${route[0]} ➝ Άφιξη: ${route[3]} </div>
                                <div class="wait">Χρόνος αναμονής: <span class="wait-time"> ${route[4]} λεπτά</span></div> 
                                <div class="wait"> Περίοδος αναμονής: απο ${route[1]} εως ${route[2]}</div>
                            </div>
                        `;
                    }
                    html += '</div>';
                    output.innerHTML = html;
                }
            } catch (e) {
                output.innerHTML = `<div class="no-results">Σφάλμα: ${e.message}</div>`;
            }
        });
    </script>
</body>
</html>
